services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: crm-architect:latest
    container_name: crm-architect-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8080}
      LOG_CHANNEL: stderr
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-/var/www/html/database/database.sqlite}
      APP_RUN_MIGRATIONS: ${APP_RUN_MIGRATIONS:-true}
      APP_RUN_SEEDER: ${APP_RUN_SEEDER:-false}
      APP_STORAGE_LINK: ${APP_STORAGE_LINK:-true}
    volumes:
      - ./app:/var/www/html/app
      - ./routes:/var/www/html/routes
      - ./resources:/var/www/html/resources
      - ./public:/var/www/html/public
      - storage_data:/var/www/html/storage
      - database_data:/var/www/html/database

volumes:
  storage_data:
  database_data:
