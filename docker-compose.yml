services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: clevercrm-app:latest
    container_name: clevercrm-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_KEY: ${APP_KEY:-}
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5488
      DB_DATABASE: ${POSTGRES_DB:-clevercrm}
      DB_USERNAME: ${POSTGRES_USER:-clevercrm}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-clevercrm}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      APP_RUN_MIGRATIONS: ${APP_RUN_MIGRATIONS:-true}
      APP_RUN_SEEDER: ${APP_RUN_SEEDER:-false}
      APP_STORAGE_LINK: ${APP_STORAGE_LINK:-true}
    volumes:
      - storage_data:/var/www/html/storage

  db:
    image: postgres:16-alpine
    container_name: clevercrm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clevercrm}
      POSTGRES_USER: ${POSTGRES_USER:-clevercrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clevercrm}
    ports:
      - "${POSTGRES_PORT_FORWARD:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clevercrm} -d ${POSTGRES_DB:-clevercrm}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  storage_data:
  postgres_data:
